<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Smocze Włości</title>
<link rel="stylesheet" href="style.css">
<style>
@keyframes worldFadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
}
.world-region-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    margin: 7px 0;
    background: linear-gradient(135deg, rgba(15,25,50,0.9), rgba(10,18,38,0.95));
    border: 1px solid #4a6699;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    animation: worldFadeIn 0.35s ease both;
}
.world-region-btn:hover {
    background: linear-gradient(135deg, rgba(25,45,80,0.95), rgba(18,30,60,0.98));
    border-color: #8aabdd;
    box-shadow: 0 0 14px rgba(130,170,230,0.35);
    transform: translateX(-3px);
}
.region-icon { font-size: 26px; min-width: 34px; text-align: center; }
.region-label { flex: 1; font-size: 16px; font-weight: 600; color: #cfd8ff; letter-spacing: 0.5px; }
.region-arrow { font-size: 22px; color: #6680bb; transition: color 0.2s, transform 0.2s; }
.world-region-btn:hover .region-arrow { color: #aabfee; transform: translateX(3px); }
</style>

</head>
<body>

<div id="content">
    <div id="intro"></div>
    <div id="world"     class="tab-content"><h2>Świat</h2><p>Tu pojawi się mapa świata.</p></div>
    <div id="dragons"   class="tab-content"><h2>Smoki</h2><div id="dragons-list"></div></div>
    <div id="home"      class="tab-content"><h2>Dom</h2><div id="home-content"></div></div>
    <div id="work"      class="tab-content"><div id="work-content"></div></div>
    <div id="inventory" class="tab-content"><div id="inventory-content"></div></div>
    <div id="merchant"  class="tab-content"><h2>Handlarz Smoczych Jaj</h2><div id="merchant-content"></div></div>
    <div id="zadania"       class="tab-content"><div id="quest-log-content"></div></div>
    <div id="warta"         class="tab-content"><div id="warta-content"></div></div>
    <div id="ochrona"       class="tab-content"><div id="ochrona-content"></div></div>
    <div id="szpiegowanie"  class="tab-content"><div id="szpiegowanie-content"></div></div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">

    <!-- ══ SMOCZE ZEGARY ══ -->
    <div id="dragon-clock-wrap">

        <!-- Analogowy zegar na obrazie -->
        <div id="dragon-clock-img-box">
            <canvas id="dragon-clock-canvas" width="400" height="400"></canvas>
        </div>

        <!-- Cyfrowy czas -->
        <div id="dragon-clock-digital">
            <span id="dragon-time">00:00:00</span>
        </div>
        <!-- Data -->
        <div id="dragon-clock-date"></div>

    </div>
    <!-- ══ KONIEC ZEGARÓW ══ -->

    <div id="currency-display">
        <div id="curr-gold">Złoto: 0</div>
        <div id="curr-silver">Srebro: 0</div>
        <div id="curr-copper">Miedź: 0</div>
    </div>

    <h2>Zakładki</h2>
    <div class="tab"              onclick="openTab('world')">Świat</div>
    <div class="tab"              onclick="openTab('dragons')">Smoki</div>
    <div class="tab"              onclick="openTab('home')">Dom</div>
    <div id="tab-work" class="tab" onclick="openTab('work')">Praca</div>
    <div class="tab"              onclick="openTab('inventory')">Ekwipunek</div>
    <div class="tab"              onclick="openTab('merchant')">Handlarz</div>
    <div class="tab" onclick="openTab('zadania')" style="border-color:#6688cc;color:#aabbff;">📋 Zadania</div>
    <div id="tab-warta"         class="tab" style="display:none;border-color:#cc9900;color:#ffcc66;" onclick="openTab('warta')">⚔️ Warta</div>
    <div id="tab-ochrona"       class="tab" style="display:none;border-color:#4488cc;color:#88bbff;" onclick="openTab('ochrona')">🛡️ Ochrona</div>
    <div id="tab-szpiegowanie"  class="tab" style="display:none;border-color:#9944cc;color:#cc88ff;" onclick="openTab('szpiegowanie')">🌑 Szpiegowanie</div>
    <div class="tab reset-tab"   onclick="resetGame()">RESET DO POCZĄTKU</div>
</div>

<script src="script.js"></script>

<script>
/* ═════════════════════════════════════════════════════════════════
   SMOCZE ZEGARY — obraz + animowane wskazówki
   Obraz: dragon_clock_bg.jpg (umieść w tym samym folderze co index.html)
═════════════════════════════════════════════════════════════════ */
(function () {
    /* ── Konfiguracja pozycji tarczy na obrazie ──────────────────
       Jeśli wskazówki nie trafiają w środek — zmień CLOCK_CX / CLOCK_CY.
       Wszystkie wartości w pikselach KANWY (canvas 200×200).        */
    var CANVAS_SIZE = 400;

    /* Środek tarczy i promień — obliczone z oryginalnego obrazu (1024×559)
       Kadr źródłowy: x=239.5, y=0, w=h=545 → skala 200/545 = 0.367
       Środek tarczy w oryginale: x=512, y=260
       Na kanwie: x=(512-239.5)/545*200 = 100.0, y=(260-0)/545*200 = 95.4 */
    var CLOCK_CX = 200.0;   /* środek tarczy X na kanwie               */
    var CLOCK_CY = 202.0;    /* środek tarczy Y na kanwie               */
    var CLOCK_R  = 160.0;    /* promień tarczy na kanwie                */

    /* Długości wskazówek (% promienia) */
    var HOUR_LEN   = CLOCK_R * 0.35;  /* ~56 px */
    var MINUTE_LEN = CLOCK_R * 0.53;  /* ~85 px */

    /* Grubości wskazówek */
    var HOUR_W   = 5.5;
    var MINUTE_W = 3.5;

    /* Kolor wskazówek — złoty jak na oryginalnym zegarze */
    var GOLD        = '#c8a030';
    var GOLD_BRIGHT = '#f0c850';
    var GOLD_DARK   = '#7a5515';

    /* ── Ładowanie obrazu ────────────────────────────────────── */
    var canvas = document.getElementById('dragon-clock-canvas');
    var ctx    = canvas.getContext('2d');
    var img    = new Image();
    img.src    = 'dragon_clock_bg.jpg';

    /* Parametry przycinania źródłowego obrazu */
    var IMG_SRC_X = 239.5;   /* lewy  brzeg kwadratu  */
    var IMG_SRC_Y = 0;       /* górny brzeg kwadratu  */
    var IMG_SRC_W = 545;     /* szerokość kwadratu    */
    var IMG_SRC_H = 545;     /* wysokość kwadratu     */

    /* ── Rysowanie wskazówki (ornamentowej) ─────────────────── */
    function drawHand(angle, length, baseW, tipGlow) {
        var ex = CLOCK_CX + Math.cos(angle) * length;
        var ey = CLOCK_CY + Math.sin(angle) * length;
        var bx = CLOCK_CX - Math.cos(angle) * (baseW * 1.8);
        var by = CLOCK_CY - Math.sin(angle) * (baseW * 1.8);

        /* Glow pod wskazówką */
        ctx.save();
        ctx.shadowBlur  = tipGlow ? 14 : 8;
        ctx.shadowColor = 'rgba(220,170,30,0.7)';

        /* ── Trzon ─────────────────────────────────────────── */
        /* Gradienty wzdłuż wskazówki (tworzy "metaliczny" efekt) */
        var grad = ctx.createLinearGradient(bx, by, ex, ey);
        grad.addColorStop(0,   GOLD_DARK);
        grad.addColorStop(0.15, GOLD);
        grad.addColorStop(0.5,  GOLD_BRIGHT);
        grad.addColorStop(0.85, GOLD);
        grad.addColorStop(1,   GOLD_DARK);

        ctx.beginPath();
        ctx.moveTo(bx, by);
        ctx.lineTo(ex, ey);
        ctx.strokeStyle = grad;
        ctx.lineWidth   = baseW;
        ctx.lineCap     = 'butt';
        ctx.stroke();

        /* ── Ornamentowy szpic (liść/diament) ────────────────── */
        var tipLen = baseW * 3.2;
        var px = -Math.sin(angle) * baseW * 0.7;
        var py =  Math.cos(angle) * baseW * 0.7;

        ctx.beginPath();
        ctx.moveTo(ex + px,  ey + py);
        ctx.lineTo(ex + Math.cos(angle) * tipLen, ey + Math.sin(angle) * tipLen);
        ctx.lineTo(ex - px,  ey - py);
        ctx.closePath();

        var tipGrad = ctx.createLinearGradient(ex-px, ey-py, ex+px, ey+py);
        tipGrad.addColorStop(0,   GOLD_DARK);
        tipGrad.addColorStop(0.5, GOLD_BRIGHT);
        tipGrad.addColorStop(1,   GOLD_DARK);
        ctx.fillStyle = tipGrad;
        ctx.fill();

        /* ── Środkowy romb dekoracyjny ────────────────────────── */
        var mx = CLOCK_CX + Math.cos(angle) * length * 0.42;
        var my = CLOCK_CY + Math.sin(angle) * length * 0.42;
        var rw = baseW * 0.9;
        var rpx = -Math.sin(angle) * rw;
        var rpy =  Math.cos(angle) * rw;
        ctx.beginPath();
        ctx.moveTo(mx + rpx, my + rpy);
        ctx.lineTo(mx + Math.cos(angle) * rw * 1.6, my + Math.sin(angle) * rw * 1.6);
        ctx.lineTo(mx - rpx, my - rpy);
        ctx.lineTo(mx - Math.cos(angle) * rw * 1.0, my - Math.sin(angle) * rw * 1.0);
        ctx.closePath();
        ctx.fillStyle = 'rgba(240,200,60,0.55)';
        ctx.fill();

        ctx.restore();
    }

    /* ── Oś centralna ────────────────────────────────────────── */
    function drawPivot() {
        /* Zewnętrzny pierścień złoty */
        ctx.save();
        ctx.shadowBlur  = 10;
        ctx.shadowColor = 'rgba(220,170,30,0.8)';

        var pivOuter = ctx.createRadialGradient(CLOCK_CX-1, CLOCK_CY-1, 1, CLOCK_CX, CLOCK_CY, 8);
        pivOuter.addColorStop(0,   '#fffbe8');
        pivOuter.addColorStop(0.3,  GOLD_BRIGHT);
        pivOuter.addColorStop(0.65, GOLD);
        pivOuter.addColorStop(1,    GOLD_DARK);

        ctx.beginPath();
        ctx.arc(CLOCK_CX, CLOCK_CY, 8, 0, Math.PI * 2);
        ctx.fillStyle = pivOuter;
        ctx.fill();
        ctx.strokeStyle = GOLD_BRIGHT;
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.restore();

        /* Wewnętrzna kropka */
        ctx.beginPath();
        ctx.arc(CLOCK_CX, CLOCK_CY, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#fffbe8';
        ctx.fill();
    }

    /* ── Główna pętla rysowania ──────────────────────────────── */
    function draw() {
        ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

        /* Tło — obraz zegara */
        if (img.complete && img.naturalWidth > 0) {
            ctx.drawImage(img,
                IMG_SRC_X, IMG_SRC_Y, IMG_SRC_W, IMG_SRC_H,
                0, 0, CANVAS_SIZE, CANVAS_SIZE
            );
        } else {
            /* Fallback jeśli obraz nie załadowany */
            ctx.fillStyle = '#0d0d0a';
            ctx.beginPath();
            ctx.arc(CLOCK_CX, CLOCK_CY, CLOCK_R + 5, 0, Math.PI * 2);
            ctx.fill();
        }

        /* Czas */
        var now = new Date();
        var s   = now.getSeconds();
        var m   = now.getMinutes();
        var h   = now.getHours() % 12;

        var hAngle = ((h + (m + s / 60) / 60) / 12) * Math.PI * 2 - Math.PI / 2;
        var mAngle = ((m + s / 60) / 60) * Math.PI * 2 - Math.PI / 2;

        /* Wskazówki i oś */
        drawHand(hAngle, HOUR_LEN,   HOUR_W,   false);
        drawHand(mAngle, MINUTE_LEN, MINUTE_W, true);
        drawPivot();
    }

    /* ── Cyfrowy wyświetlacz + data ──────────────────────────── */
    var DAYS   = ['Niedziela','Poniedziałek','Wtorek','Środa','Czwartek','Piątek','Sobota'];
    var MONTHS = ['stycznia','lutego','marca','kwietnia','maja','czerwca','lipca','sierpnia',
                  'września','października','listopada','grudnia'];

    function updateDigital() {
        var now = new Date();
        var hh  = String(now.getHours()).padStart(2,'0');
        var mm  = String(now.getMinutes()).padStart(2,'0');
        var ss  = String(now.getSeconds()).padStart(2,'0');
        var el  = document.getElementById('dragon-time');
        if (el) el.textContent = hh + ':' + mm + ':' + ss;

        var dateEl = document.getElementById('dragon-clock-date');
        if (dateEl) {
            dateEl.textContent =
                DAYS[now.getDay()] + ', ' +
                now.getDate() + ' ' +
                MONTHS[now.getMonth()] + ' ' +
                now.getFullYear();
        }
    }

    /* ── Start ───────────────────────────────────────────────── */
    img.onload = function () { draw(); };

    function tick() {
        draw();
        updateDigital();
        requestAnimationFrame(tick);
    }
    tick();

})();
</script>

</body>
</html>
